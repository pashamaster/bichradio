<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="bichradio" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>bichradio</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: rgba(255,255,255,0.07);
      --text: #e8e2d9;
      --muted: rgba(232,226,217,0.35);
      --accent: #c8a96e;
      --red: #e05252;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist Mono', monospace;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.028;
      pointer-events: none;
      z-index: 1000;
    }

    .app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 28px 0;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--red); }
      50% { opacity: 0.4; box-shadow: 0 0 2px var(--red); }
    }

    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 28px;
      gap: 40px;
    }

    .visualizer {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 48px;
      opacity: 0.5;
    }

    .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      animation: bounce var(--d) ease-in-out infinite alternate;
      transform-origin: bottom;
    }

    @keyframes bounce {
      from { transform: scaleY(0.1); }
      to { transform: scaleY(1); }
    }

    .visualizer.paused .bar { animation-play-state: paused; transform: scaleY(0.1); }

    .track-info {
      text-align: center;
      max-width: 320px;
      width: 100%;
    }

    .track-label {
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .track-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 5vw, 1.7rem);
      line-height: 1.35;
      color: var(--text);
      min-height: 2.7em;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease;
    }

    .track-title.fading { opacity: 0; }

    .playlist-btns {
      display: flex;
      gap: 12px;
    }

    .pl-btn {
      font-family: 'Geist Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 22px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pl-btn:hover { border-color: var(--accent); color: var(--accent); }

    .pl-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200,169,110,0.07);
    }

    .pl-btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

    .controls {
      padding: 0 28px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .main-controls {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    .btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      transition: color 0.2s, transform 0.15s;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover { color: var(--text); transform: scale(1.1); }
    .btn:active { transform: scale(0.95); }

    .btn-play {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid var(--border) !important;
      background: var(--surface) !important;
      color: var(--text);
      transition: all 0.2s;
    }

    .btn-play:hover {
      border-color: var(--accent) !important;
      color: var(--accent);
      transform: scale(1.05);
    }

    .volume-row { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 280px; }
    .volume-row.hidden { display: none; }

    .volume-icon { color: var(--muted); flex-shrink: 0; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 1px;
      background: var(--border);
      outline: none;
      border-radius: 1px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    #sc-widget-sexy, #sc-widget-class {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      bottom: 0; left: 0;
    }

    .loading-msg {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-align: center;
    }

    .counter-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 4px;
    }

    .counter-label {
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(232,226,217,0.2);
    }

    .counter-value {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: rgba(232,226,217,0.35);
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .app { animation: fadein 0.8s ease both; }

    /* ── PWA install banner ── */
    .pwa-banner {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 999;
      padding: 14px 20px 20px;
      background: #161410;
      border-top: 1px solid rgba(200,169,110,0.2);
      animation: slideup 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    .pwa-banner.visible { display: flex; align-items: center; gap: 14px; }

    @keyframes slideup {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .pwa-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: #0a0a0a;
      border: 1px solid rgba(200,169,110,0.3);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .pwa-text { flex: 1; }

    .pwa-text strong {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 3px;
    }

    .pwa-text span {
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      line-height: 1.4;
    }

    .pwa-share-icon {
      display: inline-block;
      width: 12px; height: 14px;
      vertical-align: middle;
      margin: 0 2px;
      position: relative; top: -1px;
    }

    .pwa-dismiss {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 6px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .pwa-dismiss:hover { color: var(--text); }

    /* Android variant — shows "Add to Home Screen" tap instruction */
    .pwa-banner.android .ios-hint  { display: none; }
    .pwa-banner.ios     .and-hint  { display: none; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">bichradio</div>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span>on air</span>
    </div>
  </header>

  <div class="center">
    <div class="visualizer paused" id="visualizer"></div>

    <div class="track-info">
      <div class="track-label">now playing</div>
      <div class="track-title" id="track-title">—</div>
    </div>

    <div class="playlist-btns">
      <button class="pl-btn" id="btn-class" data-playlist="https%3A//soundcloud.com/pavel-masterov/sets/class">class</button>
      <button class="pl-btn active" id="btn-sexy" data-playlist="https%3A//soundcloud.com/pavel-masterov/sets/sexy">sexy</button>
    </div>
  </div>

  <div class="controls">
    <div class="main-controls">
      <button class="btn" id="btn-prev" title="Previous">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="btn btn-play" id="btn-play" title="Play/Pause">
        <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="btn" id="btn-next" title="Next">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.25 3.64L8 16.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
    </div>
    <div class="volume-row">
      <svg class="volume-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <input type="range" id="volume" min="0" max="100" value="80" />
      <svg class="volume-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM16.5 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </div>
    <div class="loading-msg" id="status-msg">tap play to start</div>
    <div class="counter-wrap">
      <span class="counter-label">tuned in</span>
      <span class="counter-value" id="counter-value">—</span>
      <span class="counter-label">times</span>
    </div>
  </div>
</div>

<!-- PWA install banner -->
<div class="pwa-banner" id="pwa-banner" role="banner" aria-label="Install bichradio">
  <div class="pwa-icon">br</div>
  <div class="pwa-text">
    <strong>Install bichradio</strong>
    <span class="ios-hint">
      Tap
      <svg class="pwa-share-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
      then <em style="color:var(--accent);font-style:normal">Add to Home Screen</em>
    </span>
    <span class="and-hint">
      Tap <em style="color:var(--accent);font-style:normal">⋮ Menu → Add to Home Screen</em>
    </span>
  </div>
  <button class="pwa-dismiss" id="pwa-dismiss" aria-label="Dismiss">✕</button>
</div>

<iframe id="sc-widget-sexy"
  src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/pavel-masterov/sets/sexy&auto_play=false&show_artwork=false&show_user=false&show_reposts=false&show_teaser=false&visual=false"
  allow="autoplay">
</iframe>
<iframe id="sc-widget-class"
  src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/pavel-masterov/sets/class&auto_play=false&show_artwork=false&show_user=false&show_reposts=false&show_teaser=false&visual=false"
  allow="autoplay">
</iframe>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
  // ── Version check — auto-reload if stale ─────────────────
  const PAGE_VERSION = '1772090907';
  (async function checkVersion() {
    try {
      const res  = await fetch('/version.json?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) return;
      const data = await res.json();
      if (data.version && data.version !== PAGE_VERSION) {
        // New deploy detected — wipe caches and reload once
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
        location.reload(true);
      }
    } catch(e) {}
  })();

  // ── Visualizer bars ──────────────────────────────────────
  const viz = document.getElementById('visualizer');
  for (let i = 0; i < 22; i++) {
    const b = document.createElement('div');
    b.className = 'bar';
    b.style.cssText = `--d:${(0.4 + Math.random() * 0.7).toFixed(2)}s; height:${8 + Math.floor(Math.random() * 40)}px;`;
    viz.appendChild(b);
  }

  // ── Two widgets, both pre-loaded silently ────────────────
  const channels = {
    sexy:  { id: 'sexy',  iframe: document.getElementById('sc-widget-sexy'),  widget: null, tracks: [], shuffled: [], ready: false },
    class: { id: 'class', iframe: document.getElementById('sc-widget-class'), widget: null, tracks: [], shuffled: [], ready: false }
  };
  channels.sexy.widget  = SC.Widget(channels.sexy.iframe);
  channels.class.widget = SC.Widget(channels.class.iframe);

  const volSlider = document.getElementById('volume');

  // ── State ────────────────────────────────────────────────
  let activeId   = 'sexy';
  let isPlaying  = false;
  let currentIdx = 0;
  let userVolume = 80;
  let switching  = false;
  let playRetry  = null;
  let didSeek    = false;

  const SEEK_MIN   = 23 * 60 * 1000;
  const SEEK_MAX   = 43 * 60 * 1000;
  const FADE_MS    = 1000;
  const FADE_STEPS = 25;

  // ── Helpers ──────────────────────────────────────────────
  function active()   { return channels[activeId]; }
  function inactive() { return channels[activeId === 'sexy' ? 'class' : 'sexy']; }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function setTitle(title) {
    const el = document.getElementById('track-title');
    el.classList.add('fading');
    setTimeout(() => { el.textContent = title || '—'; el.classList.remove('fading'); }, 400);
  }

  function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }

  function setPlayIcon(playing) {
    document.getElementById('icon-play').style.display  = playing ? 'none' : '';
    document.getElementById('icon-pause').style.display = playing ? '' : 'none';
  }

  // ── Smooth volume fade on a specific widget ───────────────
  function fadeWidget(w, fromVol, toVol, ms, onDone) {
    let step = 0;
    const interval = ms / FADE_STEPS;
    const timer = setInterval(() => {
      step++;
      const t    = step / FADE_STEPS;
      const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; // ease-in-out cubic
      const vol  = Math.round(fromVol + (toVol - fromVol) * ease);
      w.setVolume(Math.max(0, Math.min(100, vol)));
      if (step >= FADE_STEPS) { clearInterval(timer); if (onDone) onDone(); }
    }, interval);
    return timer;
  }

  // ── Seek once per track into 23–43 min range ─────────────
  function doSeek(w) {
    if (didSeek) return;
    didSeek = true;
    w.getDuration(d => {
      if (!d || d < 60000) return;
      const seekTo = d > SEEK_MAX
        ? SEEK_MIN + Math.floor(Math.random() * (SEEK_MAX - SEEK_MIN))
        : Math.floor(d * 0.4);
      w.seekTo(seekTo);
    });
  }

  // ── Reliable play with retry ─────────────────────────────
  function reliablePlay(w, onConfirmed) {
    clearInterval(playRetry);
    let attempts = 0;
    const attempt = () => {
      if (isPlaying) { clearInterval(playRetry); playRetry = null; if (onConfirmed) onConfirmed(); return; }
      if (attempts >= 6) { clearInterval(playRetry); playRetry = null; setStatus('tap play to retry'); return; }
      attempts++;
      w.play();
    };
    attempt();
    playRetry = setInterval(attempt, 800);
  }

  // ── Play a track on the active channel ───────────────────
  function playTrack(idx) {
    didSeek = false;
    clearInterval(playRetry);
    const ch = active();
    ch.widget.skip(ch.shuffled[idx]);
    ch.widget.setVolume(userVolume);
    reliablePlay(ch.widget);
  }

  // ── Bind events for one channel widget ───────────────────
  function bindChannel(ch) {
    ch.widget.bind(SC.Widget.Events.READY, () => {
      ch.widget.getSounds(sounds => {
        if (!sounds.length) return;
        ch.tracks   = sounds;
        ch.shuffled = shuffle(sounds.map((_, i) => i));
        ch.ready    = true;
        // Keep inactive channel silenced
        if (ch.id !== activeId) ch.widget.setVolume(0);
      });
    });

    ch.widget.bind(SC.Widget.Events.PLAY, () => {
      if (ch.id !== activeId) {
        // Inactive channel fired — silence and pause it immediately
        ch.widget.setVolume(0);
        ch.widget.pause();
        return;
      }
      if (!isPlaying) {
        isPlaying = true;
        viz.classList.remove('paused');
        setPlayIcon(true);
        ch.widget.getCurrentSound(s => { if (s) setTitle(s.title); });
        setStatus('');
        setTimeout(() => doSeek(ch.widget), 400);

        // ── Lock screen / notification metadata ──────────────
        if ('mediaSession' in navigator) {
          navigator.mediaSession.metadata = new MediaMetadata({
            title:  ch.tracks[ch.shuffled[currentIdx]]?.title || 'bichradio',
            artist: 'bichradio',
            album:  activeId === 'sexy' ? 'sexy' : 'class',
            artwork: [
              { src: '/icon-192.png', sizes: '192x192', type: 'image/png' },
              { src: '/icon-512.png', sizes: '512x512', type: 'image/png' }
            ]
          });
          navigator.mediaSession.playbackState = 'playing';

          // Wire lock screen controls to the player
          navigator.mediaSession.setActionHandler('play',         () => { ch.widget.setVolume(userVolume); reliablePlay(ch.widget); });
          navigator.mediaSession.setActionHandler('pause',        () => { ch.widget.pause(); });
          navigator.mediaSession.setActionHandler('nexttrack',    () => { currentIdx = (currentIdx + 1) % ch.shuffled.length; playTrack(currentIdx); });
          navigator.mediaSession.setActionHandler('previoustrack',() => { currentIdx = (currentIdx - 1 + ch.shuffled.length) % ch.shuffled.length; playTrack(currentIdx); });
        }
      }
      // If this PLAY is from a channel switch, fade in
      if (switching) {
        fadeWidget(ch.widget, 0, userVolume, FADE_MS, () => {
          switching = false;
          document.querySelectorAll('.pl-btn').forEach(b => b.disabled = false);
        });
      }
    });

    ch.widget.bind(SC.Widget.Events.PAUSE, () => {
      if (ch.id !== activeId || switching) return;
      isPlaying = false;
      viz.classList.add('paused');
      setPlayIcon(false);
      if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
    });

    ch.widget.bind(SC.Widget.Events.FINISH, () => {
      if (ch.id !== activeId) return;
      isPlaying = false;
      currentIdx = (currentIdx + 1) % ch.shuffled.length;
      playTrack(currentIdx);
    });

    ch.widget.bind(SC.Widget.Events.ERROR, () => {
      if (ch.id !== activeId) return;
      isPlaying = false;
      setStatus('stream error — skipping…');
      setTimeout(() => { currentIdx = (currentIdx + 1) % ch.shuffled.length; playTrack(currentIdx); }, 800);
    });
  }

  bindChannel(channels.sexy);
  bindChannel(channels.class);

  // ── Channel switch — no iframe reload, near-instant ───────
  function switchChannel(toId) {
    if (switching || toId === activeId) return;
    switching = true;
    clearInterval(playRetry);
    document.querySelectorAll('.pl-btn').forEach(b => b.disabled = true);

    const from = active();
    const to   = channels[toId];

    const startSwitch = () => {
      // Pre-silence incoming, set activeId so events route correctly
      to.widget.setVolume(0);
      activeId   = toId;
      currentIdx = 0;
      didSeek    = false;
      isPlaying  = false;

      // Fade out old channel (short — 1s) while new one starts
      fadeWidget(from.widget, userVolume, 0, 500, () => {
        from.widget.pause();
        from.widget.setVolume(0);
      });

      // Start new channel immediately (will fade in via PLAY event handler)
      to.widget.skip(to.shuffled[currentIdx]);
      reliablePlay(to.widget);

      setTitle(to.tracks[to.shuffled[currentIdx]]?.title || '—');
      setStatus('');
      viz.classList.add('paused');
      setPlayIcon(false);

      // Safety release after 6s if something went wrong
      setTimeout(() => {
        if (switching) {
          switching = false;
          document.querySelectorAll('.pl-btn').forEach(b => b.disabled = false);
          if (!isPlaying) to.widget.setVolume(userVolume);
        }
      }, 6000);
    };

    if (to.ready) {
      startSwitch();
    } else {
      setStatus('loading channel…');
      let waited = 0;
      const wait = setInterval(() => {
        waited += 250;
        if (to.ready) { clearInterval(wait); startSwitch(); }
        else if (waited > 6000) {
          clearInterval(wait);
          switching = false;
          document.querySelectorAll('.pl-btn').forEach(b => b.disabled = false);
          setStatus('channel not ready — try again');
        }
      }, 250);
    }
  }

  // ── Playlist buttons ─────────────────────────────────────
  document.querySelectorAll('.pl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const toId = btn.id === 'btn-sexy' ? 'sexy' : 'class';
      if (toId === activeId || switching) return;
      document.querySelectorAll('.pl-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      switchChannel(toId);
    });
  });

  // ── Play / Pause ─────────────────────────────────────────
  document.getElementById('btn-play').addEventListener('click', () => {
    if (switching) return;
    const ch = active();
    if (isPlaying) {
      clearInterval(playRetry);
      ch.widget.pause();
    } else {
      if (!ch.ready) { setStatus('loading…'); return; }
      ch.widget.setVolume(userVolume);
      playTrack(currentIdx);
    }
  });

  document.getElementById('btn-next').addEventListener('click', () => {
    if (switching) return;
    const ch = active();
    currentIdx = (currentIdx + 1) % ch.shuffled.length;
    playTrack(currentIdx);
  });

  document.getElementById('btn-prev').addEventListener('click', () => {
    if (switching) return;
    const ch = active();
    currentIdx = (currentIdx - 1 + ch.shuffled.length) % ch.shuffled.length;
    playTrack(currentIdx);
  });

  // ── Volume ───────────────────────────────────────────────
  volSlider.addEventListener('input', e => {
    userVolume = parseInt(e.target.value);
    if (!switching) active().widget.setVolume(userVolume);
  });

  setInterval(() => {
    if (switching) return;
    active().widget.getVolume(v => {
      const r = Math.round(v);
      if (Math.abs(r - userVolume) > 2) { userVolume = r; volSlider.value = r; }
    });
  }, 700);

  // ── Visit counter (GitHub Gist) ──────────────────────────
  // Increments every time the page loads
  const GIST_ID   = '81efc77d0223e4f68efb043a0527411b';
  const GH_TOKEN  = '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';
  const GIST_FILE = 'bichradio-counter.json';

  async function gistRequest(method, body) {
    return fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method,
      headers: {
        'Authorization': `Bearer ${GH_TOKEN}`,
        'Accept': 'application/vnd.github+json',
        ...(body ? { 'Content-Type': 'application/json' } : {})
      },
      ...(body ? { body: JSON.stringify(body) } : {})
    });
  }

  async function incrementCounter() {
    try {
      const res      = await gistRequest('GET');
      if (!res.ok) return;
      const data     = await res.json();
      const current  = JSON.parse(data.files[GIST_FILE].content);
      const newCount = (current.count || 0) + 1;
      await gistRequest('PATCH', {
        files: { [GIST_FILE]: { content: JSON.stringify({ count: newCount }) } }
      });
      document.getElementById('counter-value').textContent = newCount.toLocaleString();
    } catch(e) {}
  }

  incrementCounter();

  // ── Hide volume bar on mobile/PWA ────────────────────────
  (function() {
    const isMobile  = /iphone|ipad|ipod|android/i.test(navigator.userAgent);
    const isPWA     = window.matchMedia('(display-mode: standalone)').matches
                   || window.navigator.standalone === true;
    if (isMobile || isPWA) {
      document.querySelector('.volume-row').classList.add('hidden');
    }
  })();

  // ── PWA install banner ───────────────────────────────────
  (function() {
    const banner  = document.getElementById('pwa-banner');
    const dismiss = document.getElementById('pwa-dismiss');
    const STORAGE_KEY = 'bichradio-pwa-dismissed';

    // Don't show if already dismissed, or already running as installed PWA
    const isInstalled = window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;
    const wasDismissed = sessionStorage.getItem(STORAGE_KEY);

    if (isInstalled || wasDismissed) return;

    const ua = navigator.userAgent;
    const isIOS     = /iphone|ipad|ipod/i.test(ua) && !/crios/i.test(ua);
    const isAndroid = /android/i.test(ua);
    const isMobile  = isIOS || isAndroid;
    const isSafari  = isIOS && /safari/i.test(ua) && !/fxios/i.test(ua);

    // iOS: only show in Safari (Chrome on iOS can't install PWAs)
    // Android: show in any mobile browser
    if (!isMobile) return;
    if (isIOS && !isSafari) return;

    banner.classList.add('visible');
    banner.classList.add(isIOS ? 'ios' : 'android');

    // Android: intercept the beforeinstallprompt for a native prompt
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
    });

    // Tapping the banner body on Android triggers native install prompt
    banner.addEventListener('click', async e => {
      if (e.target === dismiss) return;
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') hideBanner();
        deferredPrompt = null;
      }
      // iOS: tapping does nothing extra — user follows the text instructions
    });

    dismiss.addEventListener('click', hideBanner);

    // Auto-hide after 12 seconds
    setTimeout(hideBanner, 12000);

    function hideBanner() {
      sessionStorage.setItem(STORAGE_KEY, '1');
      banner.style.transition = 'opacity 0.4s, transform 0.4s';
      banner.style.opacity    = '0';
      banner.style.transform  = 'translateY(100%)';
      setTimeout(() => banner.remove(), 400);
    }
  })();

  // ── Service worker ───────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(console.warn);
  }
</script>
</body>
</html>
