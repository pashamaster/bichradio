<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="bichradio" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>bichradio</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: rgba(255,255,255,0.07);
      --text: #e8e2d9;
      --muted: rgba(232,226,217,0.35);
      --accent: #c8a96e;
      --red: #e05252;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist Mono', monospace;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.028;
      pointer-events: none;
      z-index: 1000;
    }

    .app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 28px 0;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--red); }
      50% { opacity: 0.4; box-shadow: 0 0 2px var(--red); }
    }

    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 28px;
      gap: 40px;
    }

    .visualizer {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 48px;
      opacity: 0.5;
    }

    .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      animation: bounce var(--d) ease-in-out infinite alternate;
      transform-origin: bottom;
    }

    @keyframes bounce {
      from { transform: scaleY(0.1); }
      to { transform: scaleY(1); }
    }

    .visualizer.paused .bar { animation-play-state: paused; transform: scaleY(0.1); }

    .track-info {
      text-align: center;
      max-width: 320px;
      width: 100%;
    }

    .track-label {
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .track-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 5vw, 1.7rem);
      line-height: 1.35;
      color: var(--text);
      min-height: 2.7em;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease;
    }

    .track-title.fading { opacity: 0; }

    .playlist-btns {
      display: flex;
      gap: 12px;
    }

    .pl-btn {
      font-family: 'Geist Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 22px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pl-btn:hover { border-color: var(--accent); color: var(--accent); }

    .pl-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200,169,110,0.07);
    }

    .pl-btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

    .controls {
      padding: 0 28px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .main-controls {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    .btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      transition: color 0.2s, transform 0.15s;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover { color: var(--text); transform: scale(1.1); }
    .btn:active { transform: scale(0.95); }

    .btn-play {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid var(--border) !important;
      background: var(--surface) !important;
      color: var(--text);
      transition: all 0.2s;
    }

    .btn-play:hover {
      border-color: var(--accent) !important;
      color: var(--accent);
      transform: scale(1.05);
    }

    .volume-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 280px;
    }

    .volume-icon { color: var(--muted); flex-shrink: 0; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 1px;
      background: var(--border);
      outline: none;
      border-radius: 1px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    #sc-widget {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      bottom: 0; left: 0;
    }

    .loading-msg {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-align: center;
    }

    .counter-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 4px;
    }

    .counter-label {
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(232,226,217,0.2);
    }

    .counter-value {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: rgba(232,226,217,0.35);
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .app { animation: fadein 0.8s ease both; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">bichradio</div>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span>on air</span>
    </div>
  </header>

  <div class="center">
    <div class="visualizer paused" id="visualizer"></div>

    <div class="track-info">
      <div class="track-label">now playing</div>
      <div class="track-title" id="track-title">—</div>
    </div>

    <div class="playlist-btns">
      <button class="pl-btn" id="btn-class" data-playlist="https%3A//soundcloud.com/pavel-masterov/sets/class">class</button>
      <button class="pl-btn active" id="btn-sexy" data-playlist="https%3A//soundcloud.com/pavel-masterov/sets/sexy">sexy</button>
    </div>
  </div>

  <div class="controls">
    <div class="main-controls">
      <button class="btn" id="btn-prev" title="Previous">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="btn btn-play" id="btn-play" title="Play/Pause">
        <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="btn" id="btn-next" title="Next">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.25 3.64L8 16.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
    </div>
    <div class="volume-row">
      <svg class="volume-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <input type="range" id="volume" min="0" max="100" value="80" />
      <svg class="volume-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM16.5 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </div>
    <div class="loading-msg" id="status-msg">tap play to start</div>
    <div class="counter-wrap">
      <span class="counter-label">tuned in</span>
      <span class="counter-value" id="counter-value">—</span>
      <span class="counter-label">times</span>
    </div>
  </div>
</div>

<iframe id="sc-widget"
  src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/pavel-masterov/sets/sexy&auto_play=false&show_artwork=false&show_user=false&show_reposts=false&show_teaser=false&visual=false"
  allow="autoplay">
</iframe>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
  // ── Visualizer bars ──────────────────────────────────────
  const viz = document.getElementById('visualizer');
  for (let i = 0; i < 22; i++) {
    const b = document.createElement('div');
    b.className = 'bar';
    b.style.cssText = `--d:${(0.4 + Math.random() * 0.7).toFixed(2)}s; height:${8 + Math.floor(Math.random() * 40)}px;`;
    viz.appendChild(b);
  }

  // ── Core refs ────────────────────────────────────────────
  const iframe    = document.getElementById('sc-widget');
  const widget    = SC.Widget(iframe);
  const volSlider = document.getElementById('volume');

  // ── State ────────────────────────────────────────────────
  let isPlaying   = false;
  let tracks      = [];
  let shuffled    = [];
  let currentIdx  = 0;
  let userVolume  = 80;   // 0–100, the user's chosen level
  let switching   = false;
  let playRetry   = null; // retry interval handle
  let gainNode    = null; // Web Audio GainNode — used for smooth fading
  let audioCtx    = null;

  const SEEK_MIN  = 23 * 60 * 1000;
  const SEEK_MAX  = 43 * 60 * 1000;
  const FADE_SECS = 2.5; // seconds for fade in/out

  // ── Web Audio setup ──────────────────────────────────────
  // We route the iframe's audio through a GainNode so we can
  // do frame-accurate, lag-free fades without postMessage queuing.
  function setupAudioContext() {
    try {
      if (audioCtx) return;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      audioCtx = new AC();
      gainNode = audioCtx.createGain();
      gainNode.gain.value = userVolume / 100;
      gainNode.connect(audioCtx.destination);

      // Find the <audio> element inside the iframe and route it
      const tryConnect = () => {
        try {
          const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
          const audio = iframeDoc.querySelector('audio');
          if (audio) {
            const src = audioCtx.createMediaElementSource(audio);
            src.connect(gainNode);
            // Now we control volume via gainNode, not widget.setVolume
            widget.setVolume(100); // keep widget at max; we control gain
          }
        } catch(e) {
          // Cross-origin: can't access iframe DOM — fall back to widget.setVolume
          gainNode = null;
          audioCtx = null;
        }
      };

      iframe.addEventListener('load', tryConnect);
      setTimeout(tryConnect, 2000);
    } catch(e) {}
  }

  // ── Fade via GainNode (frame-perfect) or fallback ────────
  function fadeGain(fromVal, toVal, secs, onDone) {
    if (gainNode && audioCtx) {
      audioCtx.resume();
      const now = audioCtx.currentTime;
      gainNode.gain.cancelScheduledValues(now);
      gainNode.gain.setValueAtTime(fromVal / 100, now);
      // Exponential ramp sounds more natural than linear
      // (can't ramp to 0, so use 0.001 as "silence")
      const target = toVal <= 0 ? 0.001 : toVal / 100;
      gainNode.gain.exponentialRampToValueAtTime(target, now + secs);
      if (toVal <= 0) {
        // After ramp, hard-set to 0
        gainNode.gain.setValueAtTime(0, now + secs);
      }
      setTimeout(onDone, secs * 1000 + 50);
    } else {
      // Fallback: postMessage-based with reduced step count to avoid queue backlog
      const steps    = 20; // fewer steps = less queue buildup
      const interval = (secs * 1000) / steps;
      let step = 0;
      const timer = setInterval(() => {
        step++;
        const t    = step / steps;
        const ease = fromVal > toVal ? t * t : 1 - (1 - t) * (1 - t);
        const vol  = Math.round(fromVal + (toVal - fromVal) * ease);
        widget.setVolume(Math.max(0, Math.min(100, vol)));
        if (step >= steps) { clearInterval(timer); onDone(); }
      }, interval);
    }
  }

  // ── Helpers ──────────────────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function setTitle(title) {
    const el = document.getElementById('track-title');
    el.classList.add('fading');
    setTimeout(() => { el.textContent = title || '—'; el.classList.remove('fading'); }, 400);
  }

  function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }

  function setPlayIcon(playing) {
    document.getElementById('icon-play').style.display  = playing ? 'none' : '';
    document.getElementById('icon-pause').style.display = playing ? '' : 'none';
  }

  function applyVolume() {
    if (gainNode && audioCtx) {
      gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
      gainNode.gain.setValueAtTime(userVolume / 100, audioCtx.currentTime);
    } else {
      widget.setVolume(userVolume);
    }
  }

  // ── Reliable play with retry ─────────────────────────────
  // widget.play() can silently fail. We verify playback started
  // and retry every 800ms until confirmed or timeout (5s).
  function reliablePlay(onConfirmed) {
    clearInterval(playRetry);
    let attempts = 0;
    const maxAttempts = 6;

    const attempt = () => {
      if (isPlaying) { clearInterval(playRetry); playRetry = null; if (onConfirmed) onConfirmed(); return; }
      if (attempts >= maxAttempts) { clearInterval(playRetry); playRetry = null; setStatus('tap play to start'); return; }
      attempts++;
      widget.play();
    };

    attempt();
    playRetry = setInterval(attempt, 800);
  }

  // ── Seek into 23–43 min range ────────────────────────────
  function doSeek() {
    widget.getDuration(d => {
      if (!d) return;
      const seekTo = d > SEEK_MAX
        ? SEEK_MIN + Math.floor(Math.random() * (SEEK_MAX - SEEK_MIN))
        : Math.floor(d * 0.4);
      widget.seekTo(seekTo);
    });
  }

  // ── Play a track ─────────────────────────────────────────
  function playTrack(idx) {
    clearInterval(playRetry);
    widget.skip(shuffled[idx]);
    // Seek happens after PLAY event fires (track is ready)
    reliablePlay();
  }

  // ── Channel switch ───────────────────────────────────────
  // Key insight: we do the fade BEFORE the user gesture window expires.
  // The gesture is the button click. We must call iframe.src= synchronously
  // or very quickly. So: start fade, but also immediately swap the src.
  // The fade runs over the old audio while the new playlist loads.
  function switchPlaylist(encodedUrl) {
    if (switching) return;
    switching = true;
    clearInterval(playRetry);
    document.querySelectorAll('.pl-btn').forEach(b => b.disabled = true);
    setStatus('switching…');

    const wasPlaying = isPlaying;

    // Start fade-out immediately (runs in parallel with iframe load)
    if (wasPlaying && gainNode) {
      fadeGain(userVolume, 0, FADE_SECS, () => {});
    } else if (wasPlaying) {
      fadeGain(userVolume, 0, FADE_SECS, () => {});
    }

    // Also immediately swap iframe — browser needs the gesture context NOW
    // We set volume=0 so there's no audio pop when it starts
    widget.setVolume(0);
    if (gainNode && audioCtx) {
      gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    }

    // Clear PWA caches async (doesn't block anything)
    if ('caches' in window) {
      caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).catch(() => {});
    }

    // Swap iframe src immediately to preserve gesture context
    const params = '&auto_play=true&show_artwork=false&show_user=false&show_reposts=false&show_teaser=false&visual=false';
    iframe.src = 'https://w.soundcloud.com/player/?url=' + encodedUrl + params;

    // Reset display state
    isPlaying = false;
    tracks = []; shuffled = []; currentIdx = 0;
    viz.classList.add('paused');
    setPlayIcon(false);
    setTitle('—');
    // READY will handle the rest
  }

  // ── Widget events ────────────────────────────────────────
  let eventsRegistered = false;

  function bindEvents() {
    if (eventsRegistered) return;
    eventsRegistered = true;

    widget.bind(SC.Widget.Events.PLAY, () => {
      if (!isPlaying) {
        isPlaying = true;
        viz.classList.remove('paused');
        setPlayIcon(true);
        widget.getCurrentSound(s => { if (s) setTitle(s.title); });
        setStatus('');
        // Seek into range on first play of a track
        setTimeout(doSeek, 300);
        // Count this session — fires the moment audio actually starts
        incrementCounter();
      }
    });

    widget.bind(SC.Widget.Events.PAUSE, () => {
      // Only mark as paused if not in the middle of a switch
      if (!switching) {
        isPlaying = false;
        viz.classList.add('paused');
        setPlayIcon(false);
      }
    });

    widget.bind(SC.Widget.Events.FINISH, () => {
      isPlaying = false;
      currentIdx = (currentIdx + 1) % shuffled.length;
      playTrack(currentIdx);
    });

    widget.bind(SC.Widget.Events.ERROR, () => {
      isPlaying = false;
      setStatus('stream error — skipping…');
      setTimeout(() => { currentIdx = (currentIdx + 1) % shuffled.length; playTrack(currentIdx); }, 1000);
    });
  }

  // ── READY ────────────────────────────────────────────────
  widget.bind(SC.Widget.Events.READY, () => {
    bindEvents();
    setupAudioContext();

    widget.getSounds(sounds => {
      if (!sounds.length) { setStatus('no tracks found'); switching = false; document.querySelectorAll('.pl-btn').forEach(b => b.disabled = false); return; }
      tracks   = sounds;
      shuffled = shuffle(sounds.map((_, i) => i));

      if (switching) {
        // New playlist loaded — it's already auto-playing at gain=0
        // Wait for PLAY event to confirm, then fade in
        setTitle(tracks[shuffled[0]].title);
        setStatus('');

        // Wait for play to confirm (via PLAY event or timeout) then fade in
        const waitForPlay = setInterval(() => {
          if (isPlaying) {
            clearInterval(waitForPlay);
            // Fade in
            fadeGain(0, userVolume, FADE_SECS, () => {
              switching = false;
              document.querySelectorAll('.pl-btn').forEach(b => b.disabled = false);
            });
          }
        }, 200);

        // Safety timeout: if play didn't start in 4s, retry
        setTimeout(() => {
          clearInterval(waitForPlay);
          if (!isPlaying) {
            widget.play();
            setTimeout(() => {
              fadeGain(0, userVolume, FADE_SECS, () => {
                switching = false;
                document.querySelectorAll('.pl-btn').forEach(b => b.disabled = false);
              });
            }, 500);
          }
        }, 4000);

      } else {
        // Initial page load
        setTitle(tracks[shuffled[0]].title);
        setStatus(`${tracks.length} tracks · tap play`);
        applyVolume();
      }
    });
  });

  // ── Playlist buttons ─────────────────────────────────────
  document.querySelectorAll('.pl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('active') || switching) return;
      document.querySelectorAll('.pl-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      switchPlaylist(btn.dataset.playlist);
    });
  });

  // ── Play / Pause button ───────────────────────────────────
  document.getElementById('btn-play').addEventListener('click', () => {
    if (switching) return;
    if (audioCtx) audioCtx.resume();
    if (isPlaying) {
      clearInterval(playRetry);
      widget.pause();
    } else {
      if (!tracks.length) { setStatus('loading…'); return; }
      applyVolume();
      playTrack(currentIdx);
    }
  });

  document.getElementById('btn-next').addEventListener('click', () => {
    if (switching) return;
    currentIdx = (currentIdx + 1) % shuffled.length;
    playTrack(currentIdx);
  });

  document.getElementById('btn-prev').addEventListener('click', () => {
    if (switching) return;
    currentIdx = (currentIdx - 1 + shuffled.length) % shuffled.length;
    playTrack(currentIdx);
  });

  // ── Volume slider ────────────────────────────────────────
  volSlider.addEventListener('input', e => {
    userVolume = parseInt(e.target.value);
    if (!switching) applyVolume();
  });

  // Sync slider with iOS hardware volume buttons
  setInterval(() => {
    if (switching || gainNode) return; // gainNode = we control volume ourselves
    widget.getVolume(v => {
      const r = Math.round(v);
      if (Math.abs(r - userVolume) > 2) { userVolume = r; volSlider.value = r; }
    });
  }, 700);

  // ── Visit counter (GitHub Gist) ──────────────────────────
  // Counts once per session when playback actually starts (PLAY event fires)
  const GIST_ID    = '81efc77d0223e4f68efb043a0527411b';
  const GH_TOKEN   = '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';
  const GIST_FILE = 'bichradio-counter.json';
  let counted     = false;
  let countQueued = false; // prevents race if PLAY fires twice quickly

  async function gistRequest(method, body) {
    return fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method,
      headers: {
        'Authorization': `Bearer ${GH_TOKEN}`,
        'Accept': 'application/vnd.github+json',
        ...(body ? { 'Content-Type': 'application/json' } : {})
      },
      ...(body ? { body: JSON.stringify(body) } : {})
    });
  }

  async function loadCounter() {
    try {
      const res  = await gistRequest('GET');
      if (!res.ok) return;
      const data = await res.json();
      const val  = JSON.parse(data.files[GIST_FILE].content);
      document.getElementById('counter-value').textContent = (val.count || 0).toLocaleString();
    } catch(e) {}
  }

  async function incrementCounter() {
    if (counted || countQueued) return;
    countQueued = true;
    try {
      // Read current value
      const res = await gistRequest('GET');
      if (!res.ok) throw new Error('read failed');
      const data     = await res.json();
      const current  = JSON.parse(data.files[GIST_FILE].content);
      const newCount = (current.count || 0) + 1;

      // Write new value
      const writeRes = await gistRequest('PATCH', {
        files: { [GIST_FILE]: { content: JSON.stringify({ count: newCount }) } }
      });
      if (!writeRes.ok) throw new Error('write failed');

      // Only mark as counted after confirmed write
      counted = true;
      document.getElementById('counter-value').textContent = newCount.toLocaleString();
    } catch(e) {
      countQueued = false; // allow one retry if network failed
    }
  }

  loadCounter();

  // ── Service worker ───────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(console.warn);
  }
</script>
